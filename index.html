<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anigami — In fase di restyling</title>
<meta name="description" content="Il sito di Anigami è in fase di restyling. Torniamo presto con una nuova veste.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Manrope:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0b0b10;
    --bg-mid: #171622;
    --accent: #d9c48a;
    --text-soft: #ece7db;
    --text-dim: rgba(236, 231, 219, 0.62);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
  }

  body {
    font-family: 'Inter', sans-serif;
    color: var(--text-soft);
    background-color: #050507;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .network {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.14;
    background-image: url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='300'%20height='300'%3E%3Cg%20fill='none'%20stroke='%23cbd0d6'%20stroke-width='0.6'%3E%3Cline%20x1='24'%20y1='38'%20x2='96'%20y2='18'/%3E%3Cline%20x1='96'%20y1='18'%20x2='168'%20y2='54'/%3E%3Cline%20x1='168'%20y1='54'%20x2='252'%20y2='30'/%3E%3Cline%20x1='24'%20y1='38'%20x2='58'%20y2='104'/%3E%3Cline%20x1='96'%20y1='18'%20x2='58'%20y2='104'/%3E%3Cline%20x1='58'%20y1='104'%20x2='136'%20y2='98'/%3E%3Cline%20x1='136'%20y1='98'%20x2='168'%20y2='54'/%3E%3Cline%20x1='136'%20y1='98'%20x2='204'%20y2='132'/%3E%3Cline%20x1='168'%20y1='54'%20x2='204'%20y2='132'/%3E%3Cline%20x1='204'%20y1='132'%20x2='252'%20y2='30'/%3E%3Cline%20x1='58'%20y1='104'%20x2='40'%20y2='188'/%3E%3Cline%20x1='136'%20y1='98'%20x2='150'%20y2='198'/%3E%3Cline%20x1='150'%20y1='198'%20x2='204'%20y2='132'/%3E%3Cline%20x1='40'%20y1='188'%20x2='150'%20y2='198'/%3E%3Cline%20x1='40'%20y1='188'%20x2='90'%20y2='252'/%3E%3Cline%20x1='150'%20y1='198'%20x2='90'%20y2='252'/%3E%3Cline%20x1='150'%20y1='198'%20x2='214'%20y2='248'/%3E%3Cline%20x1='204'%20y1='132'%20x2='214'%20y2='248'/%3E%3Cline%20x1='90'%20y1='252'%20x2='214'%20y2='248'/%3E%3C/g%3E%3Cg%20fill='%23e5e8ec'%3E%3Ccircle%20cx='24'%20cy='38'%20r='1.6'/%3E%3Ccircle%20cx='96'%20cy='18'%20r='1.6'/%3E%3Ccircle%20cx='168'%20cy='54'%20r='1.6'/%3E%3Ccircle%20cx='252'%20cy='30'%20r='1.6'/%3E%3Ccircle%20cx='58'%20cy='104'%20r='1.6'/%3E%3Ccircle%20cx='136'%20cy='98'%20r='1.6'/%3E%3Ccircle%20cx='204'%20cy='132'%20r='1.6'/%3E%3Ccircle%20cx='40'%20cy='188'%20r='1.6'/%3E%3Ccircle%20cx='150'%20cy='198'%20r='1.6'/%3E%3Ccircle%20cx='90'%20cy='252'%20r='1.6'/%3E%3Ccircle%20cx='214'%20cy='248'%20r='1.6'/%3E%3C/g%3E%3C/svg%3E");
    background-size: 300px 300px;
  }

  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(circle at 50% 45%, transparent 30%, #050507 88%);
  }

  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem;
    max-width: 640px;
    animation: fadeIn 1.6s ease-out both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .mark {
    display: inline-block;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: clamp(2.6rem, 8vw, 4.6rem);
    letter-spacing: 0.14em;
    color: var(--text-soft);
    margin: 0 0 0.4rem;
    text-transform: uppercase;
  }

  .mark span {
    color: var(--accent);
  }

  .logo {
    width: min(360px, 78vw);
    height: auto;
    margin: 0 0 1.4rem;
  }

  .tagline {
    font-family: 'Manrope', sans-serif;
    font-weight: 300;
    font-size: clamp(1.05rem, 2.4vw, 1.35rem);
    letter-spacing: 0.02em;
    color: var(--text-soft);
    margin: 0 0 1.6rem;
    line-height: 1.5;
  }

  .note {
    font-size: 0.92rem;
    font-weight: 300;
    letter-spacing: 0.02em;
    color: var(--text-dim);
    line-height: 1.7;
    margin: 0;
  }

  footer {
    position: fixed;
    bottom: 1.6rem;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 1;
  }

  footer .company {
    font-size: 0.74rem;
    letter-spacing: 0.04em;
    color: rgba(236, 231, 219, 0.5);
    margin: 0 0 0.25rem;
  }

  footer .details {
    font-size: 0.7rem;
    font-weight: 300;
    letter-spacing: 0.02em;
    color: rgba(236, 231, 219, 0.32);
    margin: 0;
  }

  footer .details a {
    color: inherit;
    text-decoration: none;
  }
</style>
</head>
<body>
  <div class="network"></div>
  <div class="vignette"></div>
  <main class="content">
    <img class="logo" src="logo-imagina.svg" alt="Imagina" onerror="this.style.display='none'; document.querySelector('.mark-fallback').style.display='inline-block';">
    <h1 class="mark mark-fallback" style="display:none;">Ani<span>gami</span></h1>
    <p class="tagline">Un nuovo capitolo si apre.</p>
    <p class="note">Il sito è momentaneamente in fase di restyling.<br>
    Torneremo presto con una nuova veste — grazie per la pazienza.</p>
  </main>
  <footer>
    <p class="company">Imagina Srl Società Benefit</p>
    <p class="details">
      Viale Giacomo Leopardi, 14 – Camerino (MC)<br>
      <a href="mailto:info@anigami.it">info@anigami.it</a> · <a href="tel:+390737685623">Tel 0737.685623</a><br>
      P.IVA/C.F. IT 01115460436
    </p>
  </footer>
</body>
</html>
